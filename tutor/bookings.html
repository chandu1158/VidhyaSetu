<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking Requests – VidhyaSetu</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/logo.css" />
</head>

<body>
    <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-container">
                    <img src="../assets/logo.png" class="logo-img" alt="VidhyaSetu" />
                    <div>
                        <h3>VidhyaSetu</h3><span>Tutor Panel</span>
                    </div>
                </div>
            </div>
            <div class="sidebar-user">
                <div class="user-avatar" id="avatarInitial">T</div>
                <div class="user-info">
                    <h4 id="sidebarName">Tutor</h4><span id="skillBadge">—</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section-title">Main</div>
                <a href="dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
                <a href="bookings.html" class="active"><span class="nav-icon">📋</span> Booking Requests</a>
                <a href="chat.html"><span class="nav-icon">💬</span> Chat</a>
                <div class="nav-section-title">Teaching</div>
                <a href="availability.html"><span class="nav-icon">📅</span> Availability</a>
                <a href="history.html"><span class="nav-icon">📖</span> Teaching History</a>
                <a href="earnings.html"><span class="nav-icon">💰</span> Earnings</a>
                <div class="nav-section-title">Account</div>
                <a href="profile.html"><span class="nav-icon">👤</span> My Profile</a>
                <a href="skill-test.html"><span class="nav-icon">🧪</span> Skill Test</a>
                <a href="#" class="logout-link" onclick="logout()"><span class="nav-icon">🚪</span> Logout</a>
            </nav>
        </aside>
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

        <main class="main-content">
            <div class="top-bar">
                <div style="display:flex;align-items:center;gap:14px;">
                    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
                    <h2>Booking Requests</h2>
                </div>
                <div class="top-bar-right">
                    <div class="user-avatar" style="width:38px;height:38px;font-size:14px;" id="topAvatar">T</div>
                </div>
            </div>

            <div class="page-body">
                <!-- Filter Tabs -->
                <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;">
                    <button class="btn-3d btn-primary btn-sm filter-tab active"
                        onclick="filterTab(this,'all')">All</button>
                    <button class="btn-3d btn-sm filter-tab" onclick="filterTab(this,'pending')"
                        style="background:#fff3e0;color:#e65100;box-shadow:0 4px #e8d5b0;">⏳ Pending</button>
                    <button class="btn-3d btn-sm filter-tab" onclick="filterTab(this,'confirmed')"
                        style="background:#e8f5e9;color:#2e7d32;box-shadow:0 4px #b8d8b8;">✅ Accepted</button>
                    <button class="btn-3d btn-sm filter-tab" onclick="filterTab(this,'completed')"
                        style="background:#e3f2fd;color:#1565c0;box-shadow:0 4px #b0d0f0;">🎓 Completed</button>
                    <button class="btn-3d btn-sm filter-tab" onclick="filterTab(this,'cancelled')"
                        style="background:#ffebee;color:#c62828;box-shadow:0 4px #f0b8b8;">❌ Declined</button>
                </div>

                <div id="bookingCards">
                    <!-- Populated by JS -->
                    <div id="emptyState" style="text-align:center;padding:60px;color:#aaa;">
                        <div style="font-size:56px;margin-bottom:16px;">📋</div>
                        <h3 style="color:#bbb;margin-bottom:10px;">No Booking Requests</h3>
                        <p>Complete your profile and pass the skill test to start receiving requests!</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="toast" class="toast"></div>

    <script src="../js/db-stub.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('show'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('show'); }

        let allBookings = [], currentUid = '';

        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = '../auth/tutor-login.html'; return; }
            currentUid = user.uid;
            const snap = await db.collection('users').doc(user.uid).get();
            const data = snap.data() || JSON.parse(localStorage.getItem('vs_userdata') || '{}');
            if (!data || data.role !== 'tutor') { auth.signOut(); return; }
            document.getElementById('avatarInitial').textContent = (data.name || 'T')[0].toUpperCase();
            document.getElementById('topAvatar').textContent = (data.name || 'T')[0].toUpperCase();
            document.getElementById('sidebarName').textContent = data.name || 'Tutor';
            document.getElementById('skillBadge').textContent = data.skillLevel || '—';

            try {
                const bSnap = await db.collection('bookings').where('tutorId', '==', user.uid).orderBy('createdAt', 'desc').get();
                allBookings = bSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            } catch { allBookings = []; }
            renderCards(allBookings);
        });

        function renderCards(list) {
            const container = document.getElementById('bookingCards');
            document.getElementById('emptyState').style.display = list.length ? 'none' : 'block';
            const cards = list.filter(b => !b._placeholder).map(b => `
        <div class="card" style="margin-bottom:16px;">
            <div style="display:flex;flex-wrap:wrap;align-items:center;gap:16px;">
                <div class="user-avatar" style="font-size:20px;width:52px;height:52px;">${(b.studentName || 'S')[0]}</div>
                <div style="flex:1;min-width:160px;">
                    <h4 style="font-size:16px;font-weight:700;">${b.studentName || 'Student'}</h4>
                    <p style="font-size:13px;color:#888;margin-top:4px;">📚 ${b.subject || '—'} &nbsp;|&nbsp; 📅 ${b.date || '—'} ${b.time || ''} &nbsp;|&nbsp; 💻 ${b.mode || 'Online'}</p>
                    ${b.message ? `<p style="font-size:13px;color:#666;margin-top:8px;font-style:italic;">"${b.message}"</p>` : ''}
                </div>
                <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px;flex-shrink:0;">
                    <span class="badge badge-${b.status === 'pending' ? 'warning' : b.status === 'confirmed' ? 'success' : b.status === 'completed' ? 'info' : 'danger'}">${b.status}</span>
                    ${b.status === 'pending' ? `
                        <div style="display:flex;gap:8px;">
                            <button class="btn-3d btn-sm btn-primary" onclick="updateStatus('${b.id}','confirmed')">✅ Accept</button>
                            <button class="btn-3d btn-sm btn-danger" onclick="updateStatus('${b.id}','cancelled')">❌ Decline</button>
                        </div>` : b.status === 'confirmed' ? `
                        <div style="display:flex;gap:8px;">
                            <a href="chat.html" class="btn-3d btn-sm btn-secondary">💬 Chat</a>
                            <button class="btn-3d btn-sm btn-primary" onclick="updateStatus('${b.id}','completed')">🎓 Mark Complete</button>
                        </div>` : ''}
                </div>
            </div>
        </div>`).join('');
            if (list.length > 0) container.innerHTML = cards;
        }

        function filterTab(el, tab) {
            document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            renderCards(tab === 'all' ? allBookings : allBookings.filter(b => b.status === tab));
        }

        async function updateStatus(id, status) {
            try {
                await db.collection('bookings').doc(id).update({ status });
                allBookings = allBookings.map(b => b.id === id ? { ...b, status } : b);
                renderCards(allBookings);
                if (status === 'confirmed') showToast('Booking accepted! Student notified.', 'success');
                else if (status === 'cancelled') showToast('Booking declined.', 'info');
                else if (status === 'completed') showToast('Marked as completed!', 'success');
            } catch { showToast('Update failed. Try again.', 'error'); }
        }
    </script>
</body>

</html>

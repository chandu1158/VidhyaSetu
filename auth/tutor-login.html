<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tutor Login – VidhyaSetu</title>
    <meta name="description" content="Login to your VidhyaSetu tutor account and manage your sessions." />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/logo.css" />
</head>

<body>
    <div class="form-page">
        <div style="width:100%;max-width:460px;">
            <div style="text-align:center;margin-bottom:20px;">
                <a href="../public/index.html" style="color:#b0afc0;font-size:14px;">← Back to Home</a>
            </div>
            <div class="form-card">
                <div class="form-header">
                    <img src="../assets/logo.png" class="logo-img" alt="VidhyaSetu"
                        style="width:72px;height:72px;margin:0 auto 16px;display:block;" />
                    <h2>Tutor Login</h2>
                    <p>Welcome back! Access your teaching dashboard.</p>
                </div>

                <form id="tutorLoginForm" onsubmit="handleTutorLogin(event)">
                    <div class="form-group">
                        <label>Email Address *</label>
                        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
                    </div>
                    <div class="form-group">
                        <label>Password *</label>
                        <div style="position:relative;">
                            <input type="password" id="password" placeholder="Your password" required
                                autocomplete="current-password" style="padding-right:48px;" />
                            <button type="button" onclick="togglePwd()"
                                style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;"
                                id="eyeBtn">👁️</button>
                        </div>
                    </div>
                    <div style="display:flex;justify-content:flex-end;margin-bottom:18px;">
                        <a href="#" style="font-size:13px;color:var(--accent);">Forgot Password?</a>
                    </div>
                    <div id="login-error" style="color:#c62828;font-size:13px;margin-bottom:12px;display:none;"></div>
                    <button type="submit" class="btn-3d btn-primary btn-block" id="loginBtn"
                        style="padding:14px;font-size:16px;">Login 👨‍🏫</button>
                </form>

                <!-- Skill Test Status Notice -->
                <div
                    style="background:#e3f2fd;border-radius:10px;padding:14px 18px;margin-top:20px;font-size:13px;color:#1565c0;">
                    ℹ️ <strong>New tutors:</strong> You will be redirected to take the skill test if you haven't passed
                    it yet.
                </div>

                <div style="margin:22px 0;display:flex;align-items:center;gap:12px;">
                    <div style="flex:1;height:1px;background:#e0e0ee;"></div>
                    <span style="font-size:13px;color:#aaa;">OR</span>
                    <div style="flex:1;height:1px;background:#e0e0ee;"></div>
                </div>

                <a href="../auth/register.html" class="btn-3d btn-block"
                    style="text-align:center;padding:13px;font-size:15px;box-shadow:none;border:2px solid var(--accent);background:transparent;color:var(--accent);">📝
                    Register as Tutor</a>
                <div class="form-link" style="margin-top:16px;">Are you a student? <a href="student-login.html">Student
                        Login →</a></div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="../js/db-stub.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        let showPwd = false;
        function togglePwd() {
            showPwd = !showPwd;
            document.getElementById('password').type = showPwd ? 'text' : 'password';
            document.getElementById('eyeBtn').textContent = showPwd ? '🙈' : '👁️';
        }

        async function handleTutorLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errEl = document.getElementById('login-error');
            errEl.style.display = 'none';
            btn.textContent = 'Logging in…';
            btn.disabled = true;
            try {
                await loginTutor(email, pass);
            } catch (err) {
                errEl.textContent = err.message || 'Login failed. Check credentials.';
                errEl.style.display = 'block';
            } finally {
                btn.textContent = 'Login 👨‍🏫';
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
